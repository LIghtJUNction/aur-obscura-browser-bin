name: Publish AUR package

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aur-obscura-browser-bin
  cancel-in-progress: false

jobs:
  aur-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: obscura-browser-bin
          pkgbuild: aur/obscura-browser-bin/PKGBUILD
          assets: |
            aur/obscura-browser-bin/update.sh
          test: false
          commit_username: LIghtJUNction
          commit_email: LIghtJUNction@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update obscura-browser-bin
          post_process: |
            sudo pacman -Sy --noconfirm jq
            chmod +x update.sh
            ./update.sh
            makepkg --clean --cleanbuild --nodeps --noconfirm
          ssh_keyscan_types: rsa,ecdsa,ed25519
